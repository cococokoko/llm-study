# ──────────────────────────────────────────────────────────────────────────
# config.yaml — Study-level configuration for the LLM longitudinal pipeline
# ──────────────────────────────────────────────────────────────────────────

study:
  name: "Longitudinal LLM Behaviour Study"
  db_path: "study.db"                  # SQLite database file
  concurrency: 5                       # max parallel API calls
  requests_per_second: 3.0             # global rate limit across all models
  http_referer: "https://github.com/longitudinal-llm-study"
  site_name: "LLM Longitudinal Study"

# OpenRouter model catalogue.
# model_id must match the OpenRouter model string exactly.
# parameters override defaults per-model.
models:
  - model_id: "openai/gpt-4o"
    display_name: "GPT-4o"
    parameters:
      temperature: 0.7
      max_tokens: 1024

  - model_id: "openai/gpt-4o-mini"
    display_name: "GPT-4o-mini"
    parameters:
      temperature: 0.7
      max_tokens: 1024

  - model_id: "anthropic/claude-sonnet-4-6"
    display_name: "Claude Sonnet 4.6"
    parameters:
      temperature: 0.7
      max_tokens: 1024

  - model_id: "anthropic/claude-haiku-4-5-20251001"
    display_name: "Claude Haiku 4.5"
    parameters:
      temperature: 0.7
      max_tokens: 1024

  - model_id: "google/gemini-2.0-flash-001"
    display_name: "Gemini 2.0 Flash"
    parameters:
      temperature: 0.7
      max_tokens: 1024

  - model_id: "meta-llama/llama-3.3-70b-instruct"
    display_name: "Llama 3.3 70B"
    parameters:
      temperature: 0.7
      max_tokens: 1024

  - model_id: "mistralai/mistral-large-2411"
    display_name: "Mistral Large 2"
    parameters:
      temperature: 0.7
      max_tokens: 1024

  - model_id: "deepseek/deepseek-chat-v3-0324"
    display_name: "DeepSeek V3"
    parameters:
      temperature: 0.7
      max_tokens: 1024
