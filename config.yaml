# ──────────────────────────────────────────────────────────────────────────
# config.yaml — Study-level configuration for the LLM longitudinal pipeline
# ──────────────────────────────────────────────────────────────────────────

study:
  name: "Longitudinal LLM Behaviour Study"
  db_path: "study.db"                  # SQLite database file
  concurrency: 5                       # max parallel API calls
  requests_per_second: 3.0             # global rate limit across all models
  http_referer: "https://github.com/longitudinal-llm-study"
  site_name: "LLM Longitudinal Study"

# OpenRouter model catalogue — freemium tier only.
# model_id must match the OpenRouter model string exactly.
# To find the latest available IDs: https://openrouter.ai/models
#
# Freemium mapping (":online" suffix enables OpenRouter web search grounding):
#   ChatGPT  → chatgpt-4o-latest   tracks the live ChatGPT web UI version
#   Claude   → claude-3-5-sonnet-20241022  latest Claude on the free claude.ai tier
#   Gemini   → gemini-2.0-flash-001        free-tier Gemini (confirmed working)
#
# Web search: OpenRouter injects a search step when the model decides it needs
# current information. Source URLs are appended to the response as a Sources footer.
models:
  - model_id: "openai/chatgpt-4o-latest:online"
    display_name: "ChatGPT-4o"
    parameters:
      temperature: 0.7
      max_tokens: 1024

  - model_id: "anthropic/claude-3-5-sonnet-20241022:online"
    display_name: "Claude 3.5 Sonnet"
    parameters:
      temperature: 0.7
      max_tokens: 1024

  - model_id: "google/gemini-2.0-flash-001:online"
    display_name: "Gemini 2.0 Flash"
    parameters:
      temperature: 0.7
      max_tokens: 1024
